# docker-compose.yml — Base (shared across DEV / UAT / PROD)
#
# Env strategy:
#   Root .env.*       → Docker Compose only (ports, retention, Grafana creds)
#   api/.env.*        → All Laravel config  (injected via env_file per override)
#   iot-dashboard/.env.* → All Vite vars    (Vite reads these at build time)
#
# Usage:
#   DEV:  docker compose -f docker-compose.yml -f docker-compose.dev.yml  --env-file .env.dev  up -d --build
#   UAT:  docker compose -f docker-compose.yml -f docker-compose.uat.yml  --env-file .env.uat  up -d --build
#   PROD: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &always-restart
  restart: always

x-hc: &hc
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: iot-postgres
    <<: *always-restart
    env_file:
      - ./api/.env                    # provides POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot}"]
    logging: *default-logging
    networks: [iot_net]

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:8.0-alpine
    container_name: iot-redis
    <<: *always-restart
    env_file:
      - ./api/.env                    # provides REDIS_PASSWORD, REDIS_MAXMEMORY
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      <<: *hc
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    logging: *default-logging
    networks: [iot_net]

  # ── Mosquitto MQTT ──────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0.22
    container_name: iot-mosquitto
    <<: *always-restart
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    logging: *default-logging
    networks: [iot_net]

  # ── Laravel API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: base
    container_name: iot-api
    <<: *always-restart
    working_dir: /app
    env_file:
      - ./api/.env                    # all Laravel config in one place
    environment:
      DB_HOST:    postgres            # override: Docker hostname, not localhost
      REDIS_HOST: redis               # use Redis from this stack (session/cache); must match REDIS_PASSWORD in env_file
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null 2>&1 || exit 1"]
    logging: *default-logging
    networks: [iot_net]

  # ── Queue Worker ────────────────────────────────────────────────────────────
  queue:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: base
    container_name: iot-queue
    <<: *always-restart
    working_dir: /app
    env_file:
      - ./api/.env
    environment:
      DB_HOST:    postgres
      REDIS_HOST: redis
    command: sh -lc "php artisan queue:work --sleep=3 --tries=3 --max-time=3600"
    volumes:
      - api_storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    networks: [iot_net]

  # ── Outbox Publisher ────────────────────────────────────────────────────────
  outbox:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: base
    container_name: iot-outbox
    <<: *always-restart
    working_dir: /app
    env_file:
      - ./api/.env
    environment:
      DB_HOST:    postgres
      REDIS_HOST: redis
    command: sh -lc "while true; do php artisan outbox:publish --limit=100; sleep 5; done"
    volumes:
      - api_storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    networks: [iot_net]

  # ── Dashboard (React / Vite) ────────────────────────────────────────────────
  # No env_file or environment here — Vite bakes all vars into the JS bundle
  # at build time from iot-dashboard/.env.development or .env.production
  dashboard:
    build:
      context: .
      dockerfile: iot-dashboard/Dockerfile
      target: base
    container_name: iot-dashboard
    <<: *always-restart
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    networks: [iot_net]

  # ═══════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY STACK
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: iot-prometheus
    <<: *always-restart
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus_data:/prometheus
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
    logging: *default-logging
    networks: [iot_net]

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Grafana has no app-level env file — it's pure infrastructure config
  # so its vars live in the root .env.* and are passed via environment: directly
  grafana:
    image: grafana/grafana:12.0.1
    container_name: iot-grafana
    <<: *always-restart
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER:         ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD:     ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY:         ${GRAFANA_SECRET_KEY}
      GF_SERVER_ROOT_URL:             ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_ALLOW_SIGN_UP:         "false"
      GF_AUTH_ANONYMOUS_ENABLED:      "false"
      GF_LOG_LEVEL:                   ${GF_LOG_LEVEL:-warn}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
    logging: *default-logging
    networks: [iot_net]

  # ── Loki ────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.0
    container_name: iot-loki
    <<: *always-restart
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
    logging: *default-logging
    networks: [iot_net]

  # ── Grafana Alloy ────────────────────────────────────────────────────────────
  alloy:
    image: grafana/alloy:v1.8.3
    container_name: iot-alloy
    <<: *always-restart
    command: run /etc/alloy/alloy-config.alloy --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    volumes:
      - ./observability/alloy/alloy-config.alloy:/etc/alloy/alloy-config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    logging: *default-logging
    networks: [iot_net]

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: iot-alertmanager
    <<: *always-restart
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
    logging: *default-logging
    networks: [iot_net]

  # ── Exporters ───────────────────────────────────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: iot-postgres-exporter
    <<: *always-restart
    env_file:
      - ./api/.env                    # provides POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iot}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks: [iot_net]

  redis_exporter:
    image: oliver006/redis_exporter:v1.73.0-alpine
    container_name: iot-redis-exporter
    <<: *always-restart
    env_file:
      - ./api/.env                    # provides REDIS_PASSWORD
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    networks: [iot_net]

  mosquitto_exporter:
    image: sapcc/mosquitto-exporter:0.8.0
    container_name: iot-mosquitto-exporter
    <<: *always-restart
    env_file:
      - ./api/.env                    # provides MQTT_USER, MQTT_PASSWORD
    command: ["--endpoint", "tcp://mosquitto:1883", "--user", "${MQTT_USER}", "--password", "${MQTT_PASSWORD}"]
    ports:
      - "9234:9234"
    depends_on: [mosquitto]
    logging: *default-logging
    networks: [iot_net]

  node_exporter:
    image: prom/node-exporter:v1.9.1
    container_name: iot-node-exporter
    <<: *always-restart
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    logging: *default-logging
    networks: [iot_net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: iot-cadvisor
    <<: *always-restart
    privileged: true
    command:
      - "--housekeeping_interval=10s"
      - "--docker_only=true"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    logging: *default-logging
    networks: [iot_net]

networks:
  iot_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  mosquitto_data:
  mosquitto_log:
  api_storage:
  dashboard_node_modules:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data: