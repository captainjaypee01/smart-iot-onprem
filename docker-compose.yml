services:
  postgres:
    image: postgres:18-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot}
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [iot_net]

  redis:
    image: redis:8.4-alpine
    container_name: iot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [iot_net]

  mosquitto:
    image: eclipse-mosquitto:2.0.22
    container_name: iot-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks: [iot_net]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iot-api
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-}   # set this in your local .env (not committed)
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-iot}
      DB_USERNAME: ${POSTGRES_USER:-iot}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -lc "php artisan serve --host=0.0.0.0 --port=8000"
    networks: [iot_net]

  # ==========================
  # Observability (optional)
  # ==========================
  prometheus:
    image: prom/prometheus:latest
    container_name: iot-prometheus
    profiles: ["obs"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [iot_net]

  grafana:
    image: grafana/grafana:latest
    container_name: iot-grafana
    profiles: ["obs"]
    ports:
      - "3000:3000"
    environment:
      # set these in your root .env later (don’t commit real passwords)
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [iot_net]

  loki:
    image: grafana/loki:latest
    container_name: iot-loki
    profiles: ["obs"]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks: [iot_net]

  alloy:
    image: grafana/alloy:latest
    container_name: iot-alloy
    profiles: ["obs"]
    command: run /etc/alloy/alloy-config.alloy
    volumes:
      - ./observability/alloy/alloy-config.alloy:/etc/alloy/alloy-config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      # Alloy exposes a local UI/HTTP endpoint (helpful for debugging)
      - "12345:12345"
    networks: [iot_net]
    depends_on:
      - loki

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: iot-postgres-exporter
    profiles: ["obs"]
    environment:
      # same creds as your postgres container
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN}
    ports:
      - "9187:9187"
    networks: [iot_net]
    depends_on:
      - postgres

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: iot-redis-exporter
    profiles: ["obs"]
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    networks: [iot_net]
    depends_on:
      - redis

  mosquitto_exporter:
    image: sapcc/mosquitto-exporter:latest
    container_name: iot-mosquitto-exporter
    profiles: ["obs"]
    command: ["--endpoint", "tcp://mosquitto:1883"]
    ports:
      - "9234:9234"
    networks: [iot_net]
    depends_on:
      - mosquitto

networks:
  iot_net:

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:
  grafana_data:
  loki_data:
