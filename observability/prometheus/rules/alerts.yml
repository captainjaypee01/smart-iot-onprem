# observability/prometheus/rules/alerts.yml
# Alert rules for the IoT monitoring stack

groups:

  # ── Infrastructure ───────────────────────────────────────────────────────────
  - name: infrastructure
    rules:

      - alert: HostHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% for 5 min."

      - alert: HostLowDisk
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Low disk on {{ $labels.instance }}"
          description: "Only {{ $value | printf \"%.1f\" }}% disk remaining."

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}%."

  # ── Containers ───────────────────────────────────────────────────────────────
  - name: containers
    rules:

      - alert: ContainerDown
        expr: up{job=~"iot-api|cadvisor|node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.job }} is down"
          description: "Scrape target {{ $labels.instance }} is unreachable."

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU in container {{ $labels.name }}"

      - alert: ContainerOOMKilled
        expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container OOM killed: {{ $labels.container }}"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: postgres
    rules:

      - alert: PostgresDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      - alert: PostgresTooManyConnections
        expr: sum(pg_stat_activity_count) > 150
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Too many Postgres connections: {{ $value }}"

      - alert: PostgresSlowQueries
        expr: avg(rate(pg_stat_activity_max_tx_duration{datname!~"template.*"}[1m])) > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow Postgres queries detected"

  # ── Redis ────────────────────────────────────────────────────────────────────
  - name: redis
    rules:

      - alert: RedisDown
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage at {{ $value | printf \"%.1f\" }}%"

      - alert: RedisTooManyConnections
        expr: redis_connected_clients > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis has {{ $value }} connected clients"

  # ── IoT API ──────────────────────────────────────────────────────────────────
  - name: iot-api
    rules:

      - alert: APIHighErrorRate
        expr: rate(http_server_requests_total{status=~"5.."}[5m]) / rate(http_server_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API error rate above 5%: {{ $value | printf \"%.2f\" }}"

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency is {{ $value | printf \"%.2f\" }}s"

  # ── Mosquitto MQTT ───────────────────────────────────────────────────────────
  - name: mosquitto
    rules:

      - alert: MosquittoDown
        expr: mosquitto_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Mosquitto MQTT broker is down"