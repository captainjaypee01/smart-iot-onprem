global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Exporters (metrics)
  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: redis_exporter
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: mosquitto_exporter
    static_configs:
      - targets: ["mosquitto_exporter:9234"]

  # Later (when your apps expose /metrics)
  # - job_name: api
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["api:8000"]
