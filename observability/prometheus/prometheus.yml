# observability/prometheus/prometheus.yml
# Scrapes all IoT services + exporters. Alertmanager integration included.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    env: '${ENV:-dev}'
    project: 'iot-monitoring'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Laravel API — requires /metrics endpoint (e.g. via spatie/laravel-prometheus)
  - job_name: iot-api
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 30s

  # Node exporter — host machine metrics
  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  # cAdvisor — per-container resource usage
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # PostgreSQL exporter
  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']

  # Redis exporter
  - job_name: redis
    static_configs:
      - targets: ['redis_exporter:9121']

  # Mosquitto exporter
  - job_name: mosquitto
    static_configs:
      - targets: ['mosquitto_exporter:9234']

  # Grafana self-monitoring
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    scrape_interval: 60s

  # Alertmanager self-monitoring
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  # Loki self-monitoring
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics