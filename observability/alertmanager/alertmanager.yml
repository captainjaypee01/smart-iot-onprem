# observability/alertmanager/alertmanager.yml
# Alertmanager configuration.
#
# Dev: all receivers are no-ops (alerts are received but not forwarded).
# Prod/UAT: set SLACK_WEBHOOK_CRITICAL and SLACK_WEBHOOK_WARNING env vars on the
#           alertmanager container and uncomment the slack_configs blocks below.

global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'env', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      continue: true

    - match:
        severity: warning
      receiver: warning-alerts

receivers:

  - name: default
    webhook_configs: []

  - name: critical-alerts
    webhook_configs: []
    # ── Slack (uncomment + set env vars on the alertmanager container) ──────────
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_CRITICAL}'
    #     channel: '#iot-alerts-critical'
    #     title: '[CRITICAL] {{ .GroupLabels.alertname }}'
    #     text: |
    #       {{ range .Alerts }}
    #       *Alert:* {{ .Annotations.summary }}
    #       *Description:* {{ .Annotations.description }}
    #       *Env:* {{ .Labels.env }}
    #       {{ end }}
    #     send_resolved: true

  - name: warning-alerts
    webhook_configs: []
    # ── Slack (uncomment + set env vars on the alertmanager container) ──────────
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_WARNING}'
    #     channel: '#iot-alerts-warning'
    #     title: '[WARNING] {{ .GroupLabels.alertname }}'
    #     text: |
    #       {{ range .Alerts }}
    #       *Alert:* {{ .Annotations.summary }}
    #       {{ end }}
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']
